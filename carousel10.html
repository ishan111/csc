<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>IDFC Carousel (No Swipe)</title>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin:0; font-family: Arial; }

.wrapper { width:100%; height:100%; position:relative; overflow:hidden; }

.track {
  display:flex;
  width:100%;
  height:100%;
  transition: transform 300ms ease;
}

.slide {
  flex:0 0 100%;
  padding:12px;
}

.strip {
  height:100%;
  border-radius:18px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
}

.primary { background: linear-gradient(135deg,#950f24,#b5122b); }
.blue { background: linear-gradient(135deg,#163d80,#1f4fa3); }
.gold { background: linear-gradient(135deg,#c68a13,#e0a321); }
.charcoal { background: linear-gradient(135deg,#23262c,#3b4049); }

.iconWrap {
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
}

.cta {
  border:none;border-radius:999px;
  padding:8px 14px;font-weight:bold;
}

.primary .cta { background:#f4b321; }
.blue .cta { background:white;color:#163d80; }
.gold .cta { background:white;color:#8a5c00; }
.charcoal .cta { background:#f4b321;color:black; }

.dots {
  position:absolute; bottom:8px; left:50%;
  transform:translateX(-50%);
  display:flex; gap:6px;
}

.dot {
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,0.4);
}

.dot.active { background:white; transform:scale(1.2); }
</style>
</head>

<body>

<div class="wrapper">
  <div class="track" id="track">

    <div class="slide">
      <div class="strip primary"
        onclick="handleBannerClick('reward','reward_points','idfc://reward')">
        <div style="display:flex;gap:10px;">
          <div class="iconWrap">🎁</div>
          <div>
            <div><b>₹500 Reward Points</b></div>
            <div style="font-size:12px;">Complete 1 step</div>
          </div>
        </div>
        <button class="cta"
          onclick="handleCTA(event,'reward','reward_points','claim','idfc://reward')">
          Claim
        </button>
      </div>
    </div>

    <div class="slide">
      <div class="strip blue"
        onclick="handleBannerClick('quiz','quiz','idfc://quiz')">
        <div style="display:flex;gap:10px;">
          <div class="iconWrap">🧠</div>
          <div>
            <div><b>Quiz Challenge</b></div>
            <div style="font-size:12px;">Win rewards</div>
          </div>
        </div>
        <button class="cta"
          onclick="handleCTA(event,'quiz','quiz','play','idfc://quiz')">
          Play
        </button>
      </div>
    </div>

    <div class="slide">
      <div class="strip gold"
        onclick="handleBannerClick('offer','cashback','idfc://cashback')">
        <div style="display:flex;gap:10px;">
          <div class="iconWrap">⚡</div>
          <div>
            <div><b>₹100 Cashback</b></div>
            <div style="font-size:12px;">Limited time</div>
          </div>
        </div>
        <button class="cta"
          onclick="handleCTA(event,'offer','cashback','activate','idfc://cashback')">
          Activate
        </button>
      </div>
    </div>

    <div class="slide">
      <div class="strip charcoal"
        onclick="handleBannerClick('premium','upgrade','idfc://premium')">
        <div style="display:flex;gap:10px;">
          <div class="iconWrap">💳</div>
          <div>
            <div><b>Upgrade to Premium</b></div>
            <div style="font-size:12px;">More benefits</div>
          </div>
        </div>
        <button class="cta"
          onclick="handleCTA(event,'premium','upgrade','view','idfc://premium')">
          View
        </button>
      </div>
    </div>

  </div>

  <div class="dots" id="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
const track = document.getElementById('track');
const dots = document.querySelectorAll('.dot');
const slides = document.querySelectorAll('.slide');

let index = 0;
let clickLock = false;

function sendCTEvent(event, props){
  if(window.ReactNativeWebView){
    window.ReactNativeWebView.postMessage(JSON.stringify({event,props}));
  }
}

function handleBannerClick(id,name,link){
  if(clickLock) return;
  clickLock=true;

  sendCTEvent('banner_clicked',{
    banner_id:id,
    banner_name:name,
    click_target:'strip',
    cta_target:link
  });

  setTimeout(()=>clickLock=false,400);
}

function handleCTA(e,id,name,target,link){
  e.stopPropagation();
  if(clickLock) return;
  clickLock=true;

  sendCTEvent('banner_clicked',{
    banner_id:id,
    banner_name:name,
    click_target:'cta',
    cta_target:link
  });

  setTimeout(()=>clickLock=false,400);
}

function render(){
  track.style.transform = `translateX(-${index*100}%)`;
  dots.forEach((d,i)=>d.classList.toggle('active',i===index));
}

setInterval(()=>{
  index = (index+1)%slides.length;
  render();
},3000);

render();
</script>

</body>
</html>
