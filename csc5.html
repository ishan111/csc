<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC5 Spin Reward</title>

<style>
body{
margin:0;
font-family:Arial;
background:transparent;
}

.strip{
display:flex;
align-items:center;
justify-content:space-between;

padding:14px 16px;
border-radius:16px;

background:linear-gradient(135deg,#0ea5e9,#2563eb);
color:white;

box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.left{
display:flex;
align-items:center;
gap:12px;
}

.icon{
font-size:24px;
animation:spin 3s linear infinite;
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.title{
font-weight:700;
font-size:15px;
}

.subtitle{
font-size:12px;
opacity:.9;
}

.cta{
background:white;
color:#2563eb;
border:none;
padding:8px 12px;
border-radius:20px;
font-weight:700;
cursor:pointer;
}
</style>
</head>

<body>

<div class="strip">
<div class="left">
<div class="icon">🎡</div>

<div>
<div class="title">Spin the Lucky Wheel</div>
<div class="subtitle">Win cashback & vouchers</div>
</div>
</div>

<button class="cta">Spin</button>
</div>

</body>
</html>
