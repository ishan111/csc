<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no"
  />
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    .card {
      width: calc(100vw - 28px);
      margin: 4px auto 2px;
      background: #ffffff;
      border: 1px solid #ead9de;
      border-radius: 14px;
      box-shadow: 0 2px 8px rgba(100, 20, 35, 0.06);
      padding: 24px 4px 8px;
      position: relative;
      overflow: hidden;
    }

    .ribbon {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translate(-50%, -18%);
      background: #a51c43;
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      padding: 6px 14px 7px;
      border-radius: 0 0 10px 10px;
      white-space: nowrap;
      z-index: 2;
      box-shadow: 0 2px 6px rgba(100, 20, 35, 0.12);
    }

    .viewport {
      width: 100%;
      overflow: hidden;
    }

    .track {
      display: flex;
      width: 100%;
      transition: transform 0.25s ease;
    }

    .slide {
      min-width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2px;
      padding: 0 1px;
    }

    .item {
      flex: 1;
      min-width: 0;
      text-align: center;
    }

    .ring {
      width: 54px;
      height: 54px;
      margin: 0 auto 5px;
      border-radius: 50%;
      border: 3px solid #c9a04d;
      background: linear-gradient(180deg, #fffdf8 0%, #fcf6ea 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 2px #fff;
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #f9f2f4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #a51c43;
    }

    .label {
      font-size: 9px;
      line-height: 1.1;
      color: #2e2e2e;
      font-weight: 600;
      min-height: 20px;
      padding: 0 1px;
      word-break: break-word;
      overflow: hidden;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-top: 5px;
    }

    .dot {
      width: 12px;
      height: 4px;
      border-radius: 999px;
      background: #dbc9cf;
    }

    .dot.active {
      width: 18px;
      background: #a51c43;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="ribbon">what's new</div>

    <div class="viewport" id="viewport">
      <div class="track" id="track"></div>
    </div>

    <div class="dots" id="dots"></div>
  </div>

  <script>
    const defaultData = [
      { label: "Cards", emoji: "💳", url: "idfc://cards" },
      { label: "Loans", emoji: "₹", url: "idfc://loans" },
      { label: "Deposits", emoji: "🏦", url: "idfc://deposits" },
      { label: "UPI", emoji: "📱", url: "idfc://upi" },
      { label: "Bills", emoji: "🧾", url: "idfc://bills" },
      { label: "Rewards", emoji: "🎁", url: "idfc://rewards" },
      { label: "Insure", emoji: "🛡️", url: "idfc://insurance" },
      { label: "Spend", emoji: "📊", url: "idfc://spend" }
    ];

    const items = Array.isArray(window.stripData) && window.stripData.length
      ? window.stripData
      : defaultData;

    const itemsPerSlide = 4;
    const pages = [];
    for (let i = 0; i < items.length; i += itemsPerSlide) {
      pages.push(items.slice(i, i + itemsPerSlide));
    }

    const track = document.getElementById("track");
    const dots = document.getElementById("dots");

    pages.forEach((pageItems, pageIndex) => {
      const slide = document.createElement("div");
      slide.className = "slide";

      pageItems.forEach(item => {
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <div class="ring">
            <div class="icon">${item.emoji || "•"}</div>
          </div>
          <div class="label">${item.label || ""}</div>
        `;

        if (item.url) {
          el.addEventListener("click", () => {
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(JSON.stringify({
                type: "item_click",
                label: item.label,
                url: item.url
              }));
            }
          });
        }

        slide.appendChild(el);
      });

      track.appendChild(slide);

      const dot = document.createElement("div");
      dot.className = "dot" + (pageIndex === 0 ? " active" : "");
      dots.appendChild(dot);
    });

    let current = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function sendHeight() {
      if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify({
          type: "height",
          value: document.documentElement.scrollHeight
        }));
      }
    }

    function updateCarousel(animated = true) {
      track.style.transition = animated ? "transform 0.25s ease" : "none";
      track.style.transform = `translateX(-${current * 100}%)`;

      [...dots.children].forEach((dot, idx) => {
        dot.classList.toggle("active", idx === current);
      });

      sendHeight();
    }

    const viewport = document.getElementById("viewport");

    viewport.addEventListener("touchstart", (e) => {
      isDragging = true;
      startX = e.touches[0].clientX;
      currentX = startX;
    }, { passive: true });

    viewport.addEventListener("touchmove", (e) => {
      if (!isDragging) return;
      currentX = e.touches[0].clientX;
    }, { passive: true });

    viewport.addEventListener("touchend", () => {
      if (!isDragging) return;

      const diff = currentX - startX;

      if (Math.abs(diff) > 30) {
        if (diff < 0 && current < pages.length - 1) current++;
        if (diff > 0 && current > 0) current--;
      }

      isDragging = false;
      updateCarousel(true);
    });

    window.addEventListener("load", () => {
      updateCarousel(false);
      setTimeout(sendHeight, 100);
      setTimeout(sendHeight, 250);
    });
  </script>
</body>
</html>
